# =============================================================================
# .github/workflows/secret-rotation-check.yml
# Verificación de expiración y validez de secretos y credenciales
# =============================================================================
#
# PROPÓSITO:
#   Los secretos caducados o comprometidos son una de las causas más comunes
#   de incidentes de seguridad. Este workflow NO rota secretos automáticamente
#   (eso requiere cambios en múltiples sistemas), sino que:
#     1. Verifica que los secretos ACTUALES son válidos (haciendo llamadas de prueba)
#     2. Obtiene fechas de expiración donde la API lo permite
#     3. Alerta al equipo con suficiente antelación para rotar manualmente
#
# SECRETOS VERIFICADOS:
#   - GitHub PATs (tokens de acceso personal): validez via API
#   - AWS IAM Access Keys: fecha de creación y last-used via AWS CLI
#   - Docker Hub tokens: validez via Docker Hub API
#   - npm tokens: validez via npmjs.com API
#   - Snyk tokens: validez via Snyk API
#   - GCP Service Account keys: fecha de expiración via gcloud
#
# DISEÑO DE SEGURIDAD:
#   - NUNCA se imprime el valor de un secreto en los logs
#   - Las verificaciones son llamadas de solo lectura a las APIs
#   - Los resultados se muestran como [VÁLIDO], [EXPIRADO] o [PRÓXIMO A EXPIRAR]
#   - El workflow usa el principio de menor privilegio en cada llamada
#
# SECRETOS NECESARIOS (además de los que se verifican):
#   - SLACK_WEBHOOK_URL         → Para notificaciones
#   - AWS_ACCESS_KEY_ID         → Para verificar expiración de IAM keys
#   - AWS_SECRET_ACCESS_KEY     → Para verificar expiración de IAM keys
#   - GITHUB_CHECK_PAT          → PAT con scope "read:user" para verificar validez de tokens
#   - DOCKER_HUB_TOKEN          → Para verificar validez contra Docker Hub API
#   - NPM_TOKEN                 → Para verificar validez contra npmjs.com
#   - SNYK_TOKEN                → Para verificar validez contra Snyk API
#   - GCP_SA_KEY                → JSON de Service Account de GCP (si aplica)
# =============================================================================

name: "🔄 Secret Expiration Check"

on:
  schedule:
    # Verificación diaria a las 08:00 UTC — hora de inicio laboral en Europa
    - cron: "0 8 * * *"

    # Alternativas:
    # Solo días laborables (lun-vie):
    # - cron: "0 8 * * 1-5"
    # Semanal (lunes):
    # - cron: "0 8 * * 1"

  workflow_dispatch:
    inputs:
      check_type:
        description: "Tipo de verificación a ejecutar"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - github_tokens
          - cloud_credentials
          - api_keys
          - docker_tokens

      alert_before_days:
        description: "Días antes de expiración para alertar"
        required: false
        default: "14"
        type: string

      dry_run:
        description: "Dry run: verificar sin enviar alertas"
        required: false
        default: false
        type: boolean

# =============================================================================
# PERMISOS — Solo lectura
# =============================================================================
permissions:
  contents: read  # Solo necesitamos leer el código (para scripts)

# =============================================================================
# CONCURRENCIA
# =============================================================================
concurrency:
  group: secret-rotation-check
  cancel-in-progress: false

# =============================================================================
# VARIABLES GLOBALES
# =============================================================================
env:
  ALERT_BEFORE_DAYS: ${{ github.event.inputs.alert_before_days || '14' }}
  CHECK_TYPE: ${{ github.event.inputs.check_type || 'all' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:

  # ===========================================================================
  # JOB 1: VERIFICAR GITHUB PATs Y TOKENS
  # ===========================================================================
  check-github-tokens:
    name: "🔑 Verificar GitHub Tokens"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.check_type == 'all' ||
      github.event.inputs.check_type == 'github_tokens' ||
      github.event_name == 'schedule'

    outputs:
      status: ${{ steps.check.outputs.status }}
      alerts: ${{ steps.check.outputs.alerts }}
      issues_found: ${{ steps.check.outputs.issues_found }}

    steps:
      - name: "🔑 Verificar validez de GitHub Tokens"
        id: check
        run: |
          ALERTS=""
          ISSUES_FOUND="false"
          TODAY=$(date +%s)
          ALERT_SECONDS=$(( ${{ env.ALERT_BEFORE_DAYS }} * 86400 ))

          echo "============================================"
          echo "🔑 Verificando tokens de GitHub..."
          echo "============================================"

          # ===================================================================
          # VERIFICACIÓN 1: GITHUB_TOKEN del workflow (token automático)
          # Este token expira al final de cada job — siempre es válido aquí.
          # Pero podemos verificar que funciona correctamente.
          # ===================================================================
          echo ""
          echo "1️⃣ Verificando GITHUB_TOKEN (automático)..."
          GH_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}" \
            2>/dev/null)

          if [ -n "$GH_RESPONSE" ]; then
            RATE_LIMIT=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/rate_limit" | jq '.rate.remaining' 2>/dev/null || echo "?")
            echo "  ✅ GITHUB_TOKEN: válido (rate limit restante: $RATE_LIMIT)"
          else
            echo "  ❌ GITHUB_TOKEN: no responde correctamente"
            ALERTS="$ALERTS\n• ❌ GITHUB_TOKEN no funciona correctamente"
            ISSUES_FOUND="true"
          fi

          # ===================================================================
          # VERIFICACIÓN 2: PAT de verificación (GITHUB_CHECK_PAT)
          # Este es el PAT de cuenta de servicio usado para CI/CD.
          # Lo verificamos contra la API de GitHub para:
          #   - Confirmar que sigue siendo válido
          #   - Obtener la fecha de expiración si la API la expone
          #   - Detectar si el scope es insuficiente
          # ===================================================================
          echo ""
          echo "2️⃣ Verificando GITHUB_CHECK_PAT (cuenta de servicio)..."

          if [ -n "${{ secrets.GITHUB_CHECK_PAT }}" ]; then
            # Verificar validez haciendo una llamada autenticada
            PAT_RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_CHECK_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              -w "\n%{http_code}" \
              "https://api.github.com/user" 2>/dev/null)

            HTTP_CODE=$(echo "$PAT_RESPONSE" | tail -1)
            BODY=$(echo "$PAT_RESPONSE" | head -1)

            if [ "$HTTP_CODE" = "200" ]; then
              LOGIN=$(echo "$BODY" | jq -r '.login' 2>/dev/null || echo "unknown")
              echo "  ✅ GITHUB_CHECK_PAT: válido (usuario: $LOGIN)"

              # GitHub REST API v3 no expone la fecha de expiración del token
              # en la respuesta de /user. Sin embargo, podemos ver el header
              # X-OAuth-Scopes para verificar permisos.
              SCOPES=$(curl -sI \
                -H "Authorization: Bearer ${{ secrets.GITHUB_CHECK_PAT }}" \
                "https://api.github.com/user" 2>/dev/null | \
                grep -i "x-oauth-scopes" | cut -d':' -f2 | tr -d ' \r')

              echo "  📋 Scopes del PAT: ${SCOPES:-no disponible}"

              # Si los scopes son insuficientes para las operaciones requeridas:
              if [ -n "$SCOPES" ] && ! echo "$SCOPES" | grep -q "repo"; then
                echo "  ⚠️ El PAT puede no tener el scope 'repo' necesario"
                ALERTS="$ALERTS\n• ⚠️ GITHUB_CHECK_PAT: posiblemente sin scope 'repo'"
              fi

            elif [ "$HTTP_CODE" = "401" ]; then
              echo "  ❌ GITHUB_CHECK_PAT: INVÁLIDO o EXPIRADO (HTTP 401)"
              ALERTS="$ALERTS\n• ❌ GITHUB_CHECK_PAT: inválido o expirado — rotar INMEDIATAMENTE"
              ISSUES_FOUND="true"
            else
              echo "  ⚠️ GITHUB_CHECK_PAT: respuesta inesperada (HTTP $HTTP_CODE)"
              ALERTS="$ALERTS\n• ⚠️ GITHUB_CHECK_PAT: respuesta inesperada (HTTP $HTTP_CODE)"
            fi
          else
            echo "  ⬜ GITHUB_CHECK_PAT: no configurado (saltando)"
          fi

          # ===================================================================
          # VERIFICACIÓN 3: RELEASE_TOKEN (PAT para releases y merge bypass)
          # ===================================================================
          echo ""
          echo "3️⃣ Verificando RELEASE_TOKEN..."

          if [ -n "${{ secrets.RELEASE_TOKEN }}" ]; then
            HTTP_CODE=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.RELEASE_TOKEN }}" \
              "https://api.github.com/user" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ RELEASE_TOKEN: válido"
            elif [ "$HTTP_CODE" = "401" ]; then
              echo "  ❌ RELEASE_TOKEN: INVÁLIDO o EXPIRADO"
              ALERTS="$ALERTS\n• ❌ RELEASE_TOKEN: inválido — los releases manuales fallarán"
              ISSUES_FOUND="true"
            else
              echo "  ⚠️ RELEASE_TOKEN: respuesta inesperada (HTTP $HTTP_CODE)"
            fi
          else
            echo "  ⬜ RELEASE_TOKEN: no configurado (saltando)"
          fi

          # ===================================================================
          # VERIFICACIÓN 4: AUTOMERGE_TOKEN (PAT para Dependabot auto-merge)
          # ===================================================================
          echo ""
          echo "4️⃣ Verificando AUTOMERGE_TOKEN..."

          if [ -n "${{ secrets.AUTOMERGE_TOKEN }}" ]; then
            HTTP_CODE=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.AUTOMERGE_TOKEN }}" \
              "https://api.github.com/user" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ AUTOMERGE_TOKEN: válido"
            else
              echo "  ❌ AUTOMERGE_TOKEN: inválido o expirado (HTTP $HTTP_CODE)"
              ALERTS="$ALERTS\n• ❌ AUTOMERGE_TOKEN: inválido — el auto-merge de Dependabot fallará"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ AUTOMERGE_TOKEN: no configurado (saltando)"
          fi

          # Exportar resultados
          echo "issues_found=$ISSUES_FOUND" >> "$GITHUB_OUTPUT"

          # Escapar newlines para GITHUB_OUTPUT
          ALERTS_ESCAPED="${ALERTS//'%'/'%25'}"
          ALERTS_ESCAPED="${ALERTS_ESCAPED//$'\n'/'%0A'}"
          echo "alerts=$ALERTS_ESCAPED"     >> "$GITHUB_OUTPUT"

          if [ "$ISSUES_FOUND" = "true" ]; then
            echo "status=⚠️ Problemas detectados en tokens de GitHub" >> "$GITHUB_OUTPUT"
          else
            echo "status=✅ Tokens de GitHub verificados correctamente" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # JOB 2: VERIFICAR CREDENCIALES DE CLOUD (AWS, GCP, Azure)
  # ===========================================================================
  check-cloud-credentials:
    name: "☁️ Verificar Credenciales Cloud"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.inputs.check_type == 'all' ||
      github.event.inputs.check_type == 'cloud_credentials' ||
      github.event_name == 'schedule'

    outputs:
      status: ${{ steps.check.outputs.status }}
      alerts: ${{ steps.check.outputs.alerts }}
      issues_found: ${{ steps.check.outputs.issues_found }}

    steps:
      - name: "☁️ Verificar credenciales AWS IAM"
        id: check
        run: |
          ALERTS=""
          ISSUES_FOUND="false"
          ALERT_DAYS=${{ env.ALERT_BEFORE_DAYS }}
          TODAY=$(date +%s)

          echo "============================================"
          echo "☁️ Verificando credenciales de Cloud..."
          echo "============================================"

          # ===================================================================
          # AWS IAM Access Keys
          # La API de AWS permite obtener:
          #   - Fecha de creación de la access key
          #   - Fecha del último uso
          #   - Estado (Active / Inactive)
          # AWS no establece fechas de expiración automáticas para access keys,
          # pero la política de seguridad del equipo puede requerir rotación
          # cada N días (ej. 90 días según CIS Benchmark).
          # ===================================================================
          echo ""
          echo "1️⃣ Verificando AWS Access Keys..."

          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && \
             [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then

            # Configurar AWS CLI sin exponer las credenciales en logs
            aws configure set aws_access_key_id     "$AWS_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
            aws configure set default.region         "$AWS_DEFAULT_REGION"

            # Verificar que las credenciales son válidas
            CALLER_IDENTITY=$(aws sts get-caller-identity 2>/dev/null)

            if [ $? -eq 0 ]; then
              AWS_ACCOUNT=$(echo "$CALLER_IDENTITY" | jq -r '.Account')
              AWS_ARN=$(echo "$CALLER_IDENTITY" | jq -r '.Arn')
              echo "  ✅ AWS credentials: válidas"
              echo "  📋 Account: $AWS_ACCOUNT"
              # Mostrar el ARN SIN el access key ID (el ID de la key NO es secreto
              # pero por convención lo ocultamos)
              echo "  📋 ARN: $(echo "$AWS_ARN" | sed 's/\//[...]\//2')"

              # Obtener información de la access key actual
              # Nota: solo podemos listar las keys del usuario actual
              USER_NAME=$(echo "$AWS_ARN" | awk -F'/' '{print $NF}')
              KEYS_INFO=$(aws iam list-access-keys \
                --user-name "$USER_NAME" \
                --query 'AccessKeyMetadata[*].{Id:AccessKeyId,Status:Status,Created:CreateDate}' \
                --output json 2>/dev/null || echo "[]")

              echo "  📋 Access keys del usuario $USER_NAME:"
              echo "$KEYS_INFO" | jq -r '.[] | "     Key ID: \(.Id[0:8])***\(.Id[-4:]) | Status: \(.Status) | Creada: \(.Created)"' 2>/dev/null

              # Verificar antigüedad de cada key (política de rotación)
              MAX_KEY_AGE_DAYS=90  # Rotar cada 90 días (CIS AWS Benchmark)

              echo "$KEYS_INFO" | jq -c '.[]' 2>/dev/null | while IFS= read -r key; do
                KEY_ID=$(echo "$key" | jq -r '.Id')
                KEY_STATUS=$(echo "$key" | jq -r '.Status')
                KEY_CREATED=$(echo "$key" | jq -r '.Created')

                CREATED_EPOCH=$(date -d "$KEY_CREATED" +%s 2>/dev/null || \
                                date -j -f "%Y-%m-%dT%H:%M:%SZ" "$KEY_CREATED" +%s 2>/dev/null)
                KEY_AGE_DAYS=$(( (TODAY - CREATED_EPOCH) / 86400 ))

                echo "  📅 Key ${KEY_ID:0:8}***: ${KEY_AGE_DAYS} días de antigüedad"

                if [ "$KEY_STATUS" = "Inactive" ]; then
                  echo "  ⚠️ Key inactiva: ${KEY_ID:0:8}*** — considerar eliminar"
                elif [ "$KEY_AGE_DAYS" -gt "$MAX_KEY_AGE_DAYS" ]; then
                  echo "  ❌ Key ANTIGUA: ${KEY_ID:0:8}*** tiene ${KEY_AGE_DAYS} días (máx: $MAX_KEY_AGE_DAYS)"
                  ALERTS="${ALERTS}\n• ❌ AWS Key ${KEY_ID:0:8}***: ${KEY_AGE_DAYS} días (rotar — máx $MAX_KEY_AGE_DAYS días)"
                  ISSUES_FOUND="true"
                elif [ "$KEY_AGE_DAYS" -gt "$(( MAX_KEY_AGE_DAYS - ALERT_DAYS ))" ]; then
                  echo "  ⚠️ Key PRÓXIMA A EXPIRAR: ${KEY_ID:0:8}*** — rotar en $((MAX_KEY_AGE_DAYS - KEY_AGE_DAYS)) días"
                  ALERTS="${ALERTS}\n• ⚠️ AWS Key ${KEY_ID:0:8}***: rotar en $((MAX_KEY_AGE_DAYS - KEY_AGE_DAYS)) días"
                else
                  echo "  ✅ Key ${KEY_ID:0:8}***: OK ($KEY_AGE_DAYS días)"
                fi
              done

            else
              echo "  ❌ AWS credentials: INVÁLIDAS o EXPIRADAS"
              echo "     Los deployments a AWS fallarán"
              ALERTS="$ALERTS\n• ❌ AWS credentials: inválidas — deployments a AWS fallarán"
              ISSUES_FOUND="true"
            fi

          else
            echo "  ⬜ AWS credentials: no configuradas (saltando)"
          fi

          # ===================================================================
          # GCP Service Account
          # ===================================================================
          echo ""
          echo "2️⃣ Verificando GCP Service Account..."

          if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
            # Escribir la SA key a un archivo temporal
            echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json
            chmod 600 /tmp/gcp-sa-key.json

            # Autenticar con la SA key
            gcloud auth activate-service-account \
              --key-file=/tmp/gcp-sa-key.json \
              --quiet 2>/dev/null

            if [ $? -eq 0 ]; then
              # Obtener información de la SA
              SA_EMAIL=$(jq -r '.client_email' /tmp/gcp-sa-key.json)
              PROJECT_ID=$(jq -r '.project_id' /tmp/gcp-sa-key.json)
              KEY_ID=$(jq -r '.private_key_id' /tmp/gcp-sa-key.json)
              echo "  ✅ GCP SA: válida"
              echo "  📋 Project: $PROJECT_ID"
              echo "  📋 SA Email: $SA_EMAIL"
              echo "  📋 Key ID: ${KEY_ID:0:8}..."

              # Listar las claves de la SA para ver expiración (si tiene)
              KEY_INFO=$(gcloud iam service-accounts keys list \
                --iam-account="$SA_EMAIL" \
                --format=json \
                --filter="keyType=USER_MANAGED" \
                --project="$PROJECT_ID" 2>/dev/null || echo "[]")

              echo "$KEY_INFO" | jq -r '.[] |
                "  📅 Key \(.name | split("/") | last | .[0:8])...: " +
                "creada \(.validAfterTime) | expira \(.validBeforeTime)"' 2>/dev/null

              # Verificar si alguna key expira pronto
              TODAY_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              ALERT_DATE=$(date -u -d "+${{ env.ALERT_BEFORE_DAYS }} days" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || \
                           date -u -v+${ALERT_BEFORE_DAYS}d +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null)

              EXPIRING=$(echo "$KEY_INFO" | jq -r \
                --arg alert "$ALERT_DATE" \
                '[.[] | select(.validBeforeTime < $alert)] | length' 2>/dev/null || echo "0")

              if [ "$EXPIRING" -gt "0" ]; then
                echo "  ⚠️ $EXPIRING clave(s) de GCP SA expiran en menos de ${{ env.ALERT_BEFORE_DAYS }} días"
                ALERTS="$ALERTS\n• ⚠️ GCP SA $SA_EMAIL: $EXPIRING clave(s) expiran pronto"
                ISSUES_FOUND="true"
              fi

            else
              echo "  ❌ GCP SA key: inválida o expirada"
              ALERTS="$ALERTS\n• ❌ GCP Service Account: inválida — deployments a GCP fallarán"
              ISSUES_FOUND="true"
            fi

            # Limpiar archivo temporal con credenciales
            rm -f /tmp/gcp-sa-key.json
            gcloud auth revoke --all --quiet 2>/dev/null || true
          else
            echo "  ⬜ GCP SA key: no configurada (saltando)"
          fi

          # ===================================================================
          # Azure Service Principal (si aplica)
          # ===================================================================
          echo ""
          echo "3️⃣ Verificando Azure Service Principal..."

          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_CLIENT_SECRET }}" ] && \
             [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then

            # Login con Service Principal
            az login \
              --service-principal \
              --username "${{ secrets.AZURE_CLIENT_ID }}" \
              --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
              --tenant "${{ secrets.AZURE_TENANT_ID }}" \
              --output none 2>/dev/null

            if [ $? -eq 0 ]; then
              echo "  ✅ Azure SP: válido"

              # Obtener fecha de expiración del Client Secret
              SP_INFO=$(az ad app credential list \
                --id "${{ secrets.AZURE_CLIENT_ID }}" \
                --output json 2>/dev/null || echo "[]")

              echo "$SP_INFO" | jq -r '.[] |
                "  📅 Credential \(.keyId[0:8])...: expira \(.endDateTime)"' 2>/dev/null

              # Verificar si el secret expira pronto
              ALERT_DATE=$(date -u -d "+${{ env.ALERT_BEFORE_DAYS }} days" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null)
              EXPIRING_SOON=$(echo "$SP_INFO" | jq -r \
                --arg alert "$ALERT_DATE" \
                '[.[] | select(.endDateTime < $alert)] | length' 2>/dev/null || echo "0")

              if [ "$EXPIRING_SOON" -gt "0" ]; then
                echo "  ⚠️ $EXPIRING_SOON credential(s) del Azure SP expiran en menos de ${{ env.ALERT_BEFORE_DAYS }} días"
                ALERTS="$ALERTS\n• ⚠️ Azure SP: $EXPIRING_SOON credential(s) expiran pronto"
                ISSUES_FOUND="true"
              fi

              az logout --username "${{ secrets.AZURE_CLIENT_ID }}" 2>/dev/null || true
            else
              echo "  ❌ Azure SP: inválido o expirado"
              ALERTS="$ALERTS\n• ❌ Azure Service Principal: inválido"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ Azure SP: no configurado (saltando)"
          fi

          # Exportar resultados
          echo "issues_found=$ISSUES_FOUND" >> "$GITHUB_OUTPUT"
          ALERTS_ESCAPED="${ALERTS//'%'/'%25'}"
          ALERTS_ESCAPED="${ALERTS_ESCAPED//$'\n'/'%0A'}"
          echo "alerts=$ALERTS_ESCAPED"     >> "$GITHUB_OUTPUT"

          if [ "$ISSUES_FOUND" = "true" ]; then
            echo "status=⚠️ Problemas con credenciales cloud" >> "$GITHUB_OUTPUT"
          else
            echo "status=✅ Credenciales cloud verificadas correctamente" >> "$GITHUB_OUTPUT"
          fi
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ vars.AWS_REGION || 'us-east-1' }}

  # ===========================================================================
  # JOB 3: VERIFICAR API KEYS DE SERVICIOS EXTERNOS
  # ===========================================================================
  check-api-keys:
    name: "🔐 Verificar API Keys"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.check_type == 'all' ||
      github.event.inputs.check_type == 'api_keys' ||
      github.event_name == 'schedule'

    outputs:
      status: ${{ steps.check.outputs.status }}
      alerts: ${{ steps.check.outputs.alerts }}
      issues_found: ${{ steps.check.outputs.issues_found }}

    steps:
      - name: "🔐 Verificar API keys de servicios externos"
        id: check
        run: |
          ALERTS=""
          ISSUES_FOUND="false"

          echo "============================================"
          echo "🔐 Verificando API keys de servicios..."
          echo "============================================"

          # ===================================================================
          # SNYK TOKEN
          # ===================================================================
          echo ""
          echo "1️⃣ Verificando SNYK_TOKEN..."

          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            HTTP_CODE=$(curl -sf \
              -H "Authorization: token ${{ secrets.SNYK_TOKEN }}" \
              "https://api.snyk.io/v1/user/me" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              # Obtener info del usuario sin exponer el token en logs
              USER_INFO=$(curl -sf \
                -H "Authorization: token ${{ secrets.SNYK_TOKEN }}" \
                "https://api.snyk.io/v1/user/me" 2>/dev/null)
              USERNAME=$(echo "$USER_INFO" | jq -r '.username // .email // "unknown"' 2>/dev/null)
              echo "  ✅ SNYK_TOKEN: válido (usuario: $USERNAME)"
            elif [ "$HTTP_CODE" = "401" ]; then
              echo "  ❌ SNYK_TOKEN: INVÁLIDO o EXPIRADO"
              ALERTS="$ALERTS\n• ❌ SNYK_TOKEN: inválido — los escaneos de Snyk fallarán"
              ISSUES_FOUND="true"
            else
              echo "  ⚠️ SNYK_TOKEN: respuesta inesperada (HTTP $HTTP_CODE)"
            fi
          else
            echo "  ⬜ SNYK_TOKEN: no configurado (saltando)"
          fi

          # ===================================================================
          # NPM TOKEN
          # ===================================================================
          echo ""
          echo "2️⃣ Verificando NPM_TOKEN..."

          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            HTTP_CODE=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" \
              "https://registry.npmjs.org/-/whoami" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              NPM_USER=$(curl -sf \
                -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" \
                "https://registry.npmjs.org/-/whoami" 2>/dev/null | jq -r '.username' 2>/dev/null)
              echo "  ✅ NPM_TOKEN: válido (usuario: ${NPM_USER:-unknown})"
            elif [ "$HTTP_CODE" = "401" ]; then
              echo "  ❌ NPM_TOKEN: INVÁLIDO o REVOCADO"
              ALERTS="$ALERTS\n• ❌ NPM_TOKEN: inválido — las publicaciones a npm fallarán"
              ISSUES_FOUND="true"
            else
              echo "  ⚠️ NPM_TOKEN: respuesta inesperada (HTTP $HTTP_CODE)"
            fi
          else
            echo "  ⬜ NPM_TOKEN: no configurado (saltando)"
          fi

          # ===================================================================
          # PYPI_API_TOKEN
          # ===================================================================
          echo ""
          echo "3️⃣ Verificando PYPI_API_TOKEN..."

          if [ -n "${{ secrets.PYPI_API_TOKEN }}" ]; then
            # PyPI API v1 permite verificar un token con una llamada simple
            HTTP_CODE=$(curl -sf \
              -u "__token__:${{ secrets.PYPI_API_TOKEN }}" \
              "https://upload.pypi.org/legacy/" \
              -X POST \
              -F ":action=verify-" \
              -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")

            # PyPI retorna 400 para requests inválidos pero con token válido
            # y 403 para token inválido
            if [ "$HTTP_CODE" = "400" ]; then
              echo "  ✅ PYPI_API_TOKEN: válido (HTTP 400 = request inválido pero token OK)"
            elif [ "$HTTP_CODE" = "403" ]; then
              echo "  ❌ PYPI_API_TOKEN: INVÁLIDO o REVOCADO"
              ALERTS="$ALERTS\n• ❌ PYPI_API_TOKEN: inválido — las publicaciones a PyPI fallarán"
              ISSUES_FOUND="true"
            else
              echo "  ⚠️ PYPI_API_TOKEN: no se pudo verificar (HTTP $HTTP_CODE)"
            fi
          else
            echo "  ⬜ PYPI_API_TOKEN: no configurado (saltando)"
          fi

          # ===================================================================
          # SONATYPE (Maven Central)
          # ===================================================================
          echo ""
          echo "4️⃣ Verificando SONATYPE credentials..."

          if [ -n "${{ secrets.SONATYPE_USERNAME }}" ] && \
             [ -n "${{ secrets.SONATYPE_PASSWORD }}" ]; then

            HTTP_CODE=$(curl -sf \
              -u "${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}" \
              "https://oss.sonatype.org/service/local/authentication/login" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "  ✅ Sonatype credentials: válidas"
              # Logout
              curl -sf \
                -u "${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}" \
                "https://oss.sonatype.org/service/local/authentication/logout" \
                -X POST 2>/dev/null || true
            else
              echo "  ❌ Sonatype credentials: inválidas (HTTP $HTTP_CODE)"
              ALERTS="$ALERTS\n• ❌ Sonatype credentials: inválidas — las publicaciones a Maven Central fallarán"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ Sonatype credentials: no configuradas (saltando)"
          fi

          # ===================================================================
          # SLACK_WEBHOOK_URL — Verificar que el webhook sigue activo
          # ===================================================================
          echo ""
          echo "5️⃣ Verificando SLACK_WEBHOOK_URL..."

          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            HTTP_CODE=$(curl -sf \
              -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"🔄 Secret rotation check — webhook de verificación (ignorar este mensaje)"}' \
              "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ SLACK_WEBHOOK_URL: activo"
            else
              echo "  ❌ SLACK_WEBHOOK_URL: no responde (HTTP $HTTP_CODE)"
              echo "     Las notificaciones de CI/CD no se entregarán"
              ALERTS="$ALERTS\n• ❌ SLACK_WEBHOOK_URL: no activo — las notificaciones no se enviarán"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ SLACK_WEBHOOK_URL: no configurado (saltando)"
          fi

          # ===================================================================
          # INFRACOST_API_KEY
          # ===================================================================
          echo ""
          echo "6️⃣ Verificando INFRACOST_API_KEY..."

          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            HTTP_CODE=$(curl -sf \
              -H "X-Api-Key: ${{ secrets.INFRACOST_API_KEY }}" \
              "https://pricing.api.infracost.io/graphql" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"query":"{ __typename }"}' \
              -o /dev/null -w "%{http_code}" 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ INFRACOST_API_KEY: válida"
            else
              echo "  ❌ INFRACOST_API_KEY: inválida (HTTP $HTTP_CODE)"
              ALERTS="$ALERTS\n• ❌ INFRACOST_API_KEY: inválida"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ INFRACOST_API_KEY: no configurada (saltando)"
          fi

          # Exportar resultados
          echo "issues_found=$ISSUES_FOUND" >> "$GITHUB_OUTPUT"
          ALERTS_ESCAPED="${ALERTS//'%'/'%25'}"
          ALERTS_ESCAPED="${ALERTS_ESCAPED//$'\n'/'%0A'}"
          echo "alerts=$ALERTS_ESCAPED"     >> "$GITHUB_OUTPUT"

          if [ "$ISSUES_FOUND" = "true" ]; then
            echo "status=⚠️ Problemas con API keys" >> "$GITHUB_OUTPUT"
          else
            echo "status=✅ API keys verificadas correctamente" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # JOB 4: VERIFICAR TOKENS DE DOCKER Y CONTAINER REGISTRIES
  # ===========================================================================
  check-docker-tokens:
    name: "🐳 Verificar Docker Tokens"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.inputs.check_type == 'all' ||
      github.event.inputs.check_type == 'docker_tokens' ||
      github.event_name == 'schedule'

    outputs:
      status: ${{ steps.check.outputs.status }}
      alerts: ${{ steps.check.outputs.alerts }}
      issues_found: ${{ steps.check.outputs.issues_found }}

    steps:
      - name: "🐳 Verificar Docker Hub y Container Registries"
        id: check
        run: |
          ALERTS=""
          ISSUES_FOUND="false"

          echo "============================================"
          echo "🐳 Verificando tokens de Container Registries..."
          echo "============================================"

          # ===================================================================
          # DOCKER HUB TOKEN
          # ===================================================================
          echo ""
          echo "1️⃣ Verificando DOCKER_HUB_TOKEN..."

          if [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ] && \
             [ -n "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then

            # Obtener JWT de Docker Hub
            JWT_RESPONSE=$(curl -sf \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${{ secrets.DOCKER_HUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKER_HUB_TOKEN }}\"}" \
              "https://hub.docker.com/v2/users/login" 2>/dev/null)

            if [ $? -eq 0 ] && echo "$JWT_RESPONSE" | jq -e '.token' > /dev/null 2>&1; then
              echo "  ✅ DOCKER_HUB_TOKEN: válido"

              # Obtener info de la cuenta (sin exponer credenciales)
              JWT=$(echo "$JWT_RESPONSE" | jq -r '.token')
              ACCOUNT_INFO=$(curl -sf \
                -H "Authorization: JWT $JWT" \
                "https://hub.docker.com/v2/user/" 2>/dev/null)

              DOCKER_USER=$(echo "$ACCOUNT_INFO" | jq -r '.username // "unknown"' 2>/dev/null)
              echo "  📋 Usuario Docker Hub: $DOCKER_USER"

              # Verificar los Access Tokens configurados para detectar expiración
              TOKENS_INFO=$(curl -sf \
                -H "Authorization: JWT $JWT" \
                "https://hub.docker.com/v2/access-tokens/" 2>/dev/null || echo '{"results":[]}')

              ACTIVE_TOKENS=$(echo "$TOKENS_INFO" | jq '[.results[] | select(.is_active == true)] | length' 2>/dev/null || echo "?")
              EXPIRED_TOKENS=$(echo "$TOKENS_INFO" | jq '[.results[] | select(.is_active == false)] | length' 2>/dev/null || echo "0")

              echo "  📋 Access tokens activos: $ACTIVE_TOKENS"
              if [ "$EXPIRED_TOKENS" -gt "0" ]; then
                echo "  ⚠️ Tokens expirados/inactivos: $EXPIRED_TOKENS (limpiar en hub.docker.com)"
              fi
            else
              echo "  ❌ DOCKER_HUB_TOKEN: INVÁLIDO o EXPIRADO"
              ALERTS="$ALERTS\n• ❌ DOCKER_HUB_TOKEN: inválido — los deployments de Docker fallarán"
              ISSUES_FOUND="true"
            fi
          else
            echo "  ⬜ DOCKER_HUB_TOKEN: no configurado (saltando)"
          fi

          # ===================================================================
          # GITHUB CONTAINER REGISTRY (GHCR)
          # Usa el GITHUB_TOKEN automáticamente — siempre válido mientras
          # el token tenga los permisos correctos.
          # ===================================================================
          echo ""
          echo "2️⃣ Verificando acceso a GHCR..."

          HTTP_CODE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/" \
            -o /dev/null -w "%{http_code}" 2>/dev/null)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            # 401 es esperado sin autenticación completa pero indica que GHCR está accesible
            echo "  ✅ GHCR: accesible"
          else
            echo "  ⚠️ GHCR: respuesta inesperada (HTTP $HTTP_CODE)"
          fi

          # Exportar resultados
          echo "issues_found=$ISSUES_FOUND" >> "$GITHUB_OUTPUT"
          ALERTS_ESCAPED="${ALERTS//'%'/'%25'}"
          ALERTS_ESCAPED="${ALERTS_ESCAPED//$'\n'/'%0A'}"
          echo "alerts=$ALERTS_ESCAPED"     >> "$GITHUB_OUTPUT"

          if [ "$ISSUES_FOUND" = "true" ]; then
            echo "status=⚠️ Problemas con Docker tokens" >> "$GITHUB_OUTPUT"
          else
            echo "status=✅ Docker tokens verificados correctamente" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # JOB 5: NOTIFICACIÓN CONSOLIDADA
  # ===========================================================================
  notify:
    name: "🔔 Notificación de secretos"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - check-github-tokens
      - check-cloud-credentials
      - check-api-keys
      - check-docker-tokens
    if: always()

    steps:
      - name: "📊 Consolidar resultados"
        id: consolidate
        run: |
          # Recopilar todos los issues
          GH_ISSUES="${{ needs.check-github-tokens.outputs.issues_found }}"
          CLOUD_ISSUES="${{ needs.check-cloud-credentials.outputs.issues_found }}"
          API_ISSUES="${{ needs.check-api-keys.outputs.issues_found }}"
          DOCKER_ISSUES="${{ needs.check-docker-tokens.outputs.issues_found }}"

          TOTAL_ISSUES=0
          ALL_ALERTS=""

          [ "$GH_ISSUES"     = "true" ] && TOTAL_ISSUES=$((TOTAL_ISSUES + 1)) && ALL_ALERTS="$ALL_ALERTS\n*GitHub Tokens:*\n${{ needs.check-github-tokens.outputs.alerts }}"
          [ "$CLOUD_ISSUES"  = "true" ] && TOTAL_ISSUES=$((TOTAL_ISSUES + 1)) && ALL_ALERTS="$ALL_ALERTS\n*Cloud Credentials:*\n${{ needs.check-cloud-credentials.outputs.alerts }}"
          [ "$API_ISSUES"    = "true" ] && TOTAL_ISSUES=$((TOTAL_ISSUES + 1)) && ALL_ALERTS="$ALL_ALERTS\n*API Keys:*\n${{ needs.check-api-keys.outputs.alerts }}"
          [ "$DOCKER_ISSUES" = "true" ] && TOTAL_ISSUES=$((TOTAL_ISSUES + 1)) && ALL_ALERTS="$ALL_ALERTS\n*Docker Tokens:*\n${{ needs.check-docker-tokens.outputs.alerts }}"

          echo "total_issues=$TOTAL_ISSUES" >> "$GITHUB_OUTPUT"

          if [ "$TOTAL_ISSUES" -gt "0" ]; then
            echo "has_issues=true"                  >> "$GITHUB_OUTPUT"
            echo "overall_status=⚠️ ACCIÓN REQUERIDA: $TOTAL_ISSUES categoría(s) con problemas" >> "$GITHUB_OUTPUT"
            echo "color=danger"                     >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false"                 >> "$GITHUB_OUTPUT"
            echo "overall_status=✅ Todos los secretos verificados — sin issues" >> "$GITHUB_OUTPUT"
            echo "color=good"                       >> "$GITHUB_OUTPUT"
          fi

          # Escapar para output
          ALL_ALERTS_ESC="${ALL_ALERTS//'%'/'%25'}"
          ALL_ALERTS_ESC="${ALL_ALERTS_ESC//$'\n'/'%0A'}"
          echo "all_alerts=$ALL_ALERTS_ESC" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Notificar a Slack si hay issues (o siempre con dry_run=false)
      # -----------------------------------------------------------------------
      - name: "💬 Notificar a Slack"
        if: |
          secrets.SLACK_WEBHOOK_URL != '' &&
          steps.consolidate.outputs.has_issues == 'true' &&
          env.DRY_RUN != 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ steps.consolidate.outputs.overall_status }}",
              "attachments": [
                {
                  "color": "${{ steps.consolidate.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "🔄 Secret Expiration Check — ${{ github.repository }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.consolidate.outputs.overall_status }}\n\n${{ steps.consolidate.outputs.all_alerts }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*GitHub Tokens:*\n${{ needs.check-github-tokens.outputs.status }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Cloud Credentials:*\n${{ needs.check-cloud-credentials.outputs.status }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*API Keys:*\n${{ needs.check-api-keys.outputs.status }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Docker Tokens:*\n${{ needs.check-docker-tokens.outputs.status }}"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "Ver logs del workflow" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "Gestionar secrets" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # -----------------------------------------------------------------------
      # Job Summary completo
      # -----------------------------------------------------------------------
      - name: "📊 Job Summary"
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🔄 Secret Expiration Check

          **Estado general:** ${{ steps.consolidate.outputs.overall_status }}
          **Fecha:** $(date "+%Y-%m-%d %H:%M UTC")
          **Alerta antes de:** ${{ env.ALERT_BEFORE_DAYS }} días

          ## Resultados por categoría

          | Categoría | Estado |
          |-----------|--------|
          | 🔑 GitHub Tokens | ${{ needs.check-github-tokens.outputs.status || 'skipped' }} |
          | ☁️ Cloud Credentials | ${{ needs.check-cloud-credentials.outputs.status || 'skipped' }} |
          | 🔐 API Keys | ${{ needs.check-api-keys.outputs.status || 'skipped' }} |
          | 🐳 Docker Tokens | ${{ needs.check-docker-tokens.outputs.status || 'skipped' }} |

          ## Guía de rotación rápida

          Si se detectaron secrets inválidos o expirados:

          1. **GitHub PATs**: GitHub.com → Settings → Developer settings → Personal access tokens
          2. **AWS Keys**: AWS Console → IAM → Users → [usuario] → Security credentials
          3. **GCP SA Keys**: GCP Console → IAM → Service Accounts → [SA] → Keys
          4. **Azure SP**: Azure Portal → App registrations → [App] → Certificates & secrets
          5. **Docker Hub**: hub.docker.com → Account Settings → Security → Access Tokens
          6. **npm**: npmjs.com → Account → Access Tokens
          7. **Snyk**: app.snyk.io → Account Settings → API tokens

          Después de rotar, actualizar el secret en:
          [Settings → Secrets → Actions](${{ github.server_url }}/${{ github.repository }}/settings/secrets/actions)
          EOF
